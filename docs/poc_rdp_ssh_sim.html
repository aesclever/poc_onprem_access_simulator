<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoC Infra — Access Simulator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Top bar ── */
.topbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 0; display: flex; align-items: stretch; flex-shrink: 0; }
.tab { display: flex; align-items: center; gap: 8px; padding: 10px 20px; cursor: pointer; font-size: 0.82rem; color: #8b949e; border-bottom: 2px solid transparent; transition: all .15s; user-select: none; }
.tab:hover { color: #c9d1d9; background: #ffffff06; }
.tab.active { color: #c9d1d9; border-bottom-color: #58a6ff; background: #388bfd0a; }
.tab .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-ssh { background: #3fb950; }
.dot-rdp { background: #58a6ff; }
.dot-wg  { background: #d2a8ff; }
.spacer { flex: 1; }
.topbar-info { display: flex; align-items: center; gap: 12px; padding: 0 16px; font-size: 0.75rem; color: #8b949e; }
.status-pill { display: flex; align-items: center; gap: 5px; background: #3fb95018; border: 1px solid #3fb95040; border-radius: 10px; padding: 2px 10px; color: #3fb950; font-size: 0.72rem; font-weight: 600; }
.status-pill .blink { width: 6px; height: 6px; border-radius: 50%; background: #3fb950; animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── Layout ── */
.workspace { display: flex; flex: 1; overflow: hidden; }

/* ── Left panel ── */
.left-panel { width: 240px; flex-shrink: 0; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
.panel-title { padding: 12px 14px 8px; font-size: 0.68rem; font-weight: 700; color: #8b949e; text-transform: uppercase; letter-spacing: .9px; }
.host-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.host-item { display: flex; align-items: center; gap: 9px; padding: 8px 8px; border-radius: 6px; cursor: pointer; transition: background .12s; margin-bottom: 2px; }
.host-item:hover { background: #ffffff0a; }
.host-item.active { background: #388bfd15; }
.host-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.icon-ssh { background: #3fb95020; }
.icon-rdp { background: #58a6ff20; }
.host-meta { overflow: hidden; }
.host-name { font-size: 0.82rem; font-weight: 600; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.host-addr { font-size: 0.72rem; color: #8b949e; font-family: 'Consolas', monospace; }
.host-badge { margin-left: auto; font-size: 0.65rem; font-weight: 700; padding: 1px 7px; border-radius: 8px; flex-shrink: 0; }
.badge-ssh { background: #3fb95025; color: #3fb950; }
.badge-rdp { background: #58a6ff25; color: #58a6ff; }

.divider { height: 1px; background: #30363d; margin: 8px 8px; }
.panel-section { padding: 8px 14px 4px; font-size: 0.68rem; font-weight: 700; color: #8b949e; text-transform: uppercase; letter-spacing: .9px; }

.info-block { margin: 6px 8px; padding: 10px 12px; background: #0d1117; border-radius: 6px; border: 1px solid #30363d; }
.info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 0.75rem; }
.info-row:last-child { margin-bottom: 0; }
.info-label { color: #8b949e; }
.info-val { color: #c9d1d9; font-family: 'Consolas', monospace; font-size: 0.72rem; }
.info-val.green { color: #3fb950; }
.info-val.blue  { color: #58a6ff; }
.info-val.purple{ color: #d2a8ff; }

/* ── Terminal / RDP pane ── */
.main-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.session-bar { background: #161b22; border-bottom: 1px solid #30363d; padding: 7px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.session-bar .win-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
.win-close  { background: #f85149; }
.win-min    { background: #d29922; }
.win-max    { background: #3fb950; }
.session-title { font-size: 0.8rem; color: #8b949e; margin-left: 4px; font-family: 'Consolas', monospace; }
.session-right { margin-left: auto; display: flex; gap: 8px; }
.sess-btn { padding: 3px 10px; border-radius: 4px; border: 1px solid #30363d; background: none; color: #8b949e; font-size: 0.72rem; cursor: pointer; transition: all .12s; }
.sess-btn:hover { border-color: #58a6ff; color: #58a6ff; }

/* SSH Terminal */
.terminal { flex: 1; background: #0d1117; overflow-y: auto; padding: 14px 18px; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.82rem; line-height: 1.6; display: flex; flex-direction: column; }
.t-line { white-space: pre-wrap; word-break: break-all; }
.t-prompt { color: #3fb950; }
.t-cmd    { color: #c9d1d9; }
.t-out    { color: #8b949e; }
.t-info   { color: #58a6ff; }
.t-warn   { color: #d29922; }
.t-err    { color: #f85149; }
.t-success{ color: #3fb950; }
.t-banner { color: #d2a8ff; }
.t-data   { color: #ffa657; }
.input-row { display: flex; align-items: center; gap: 0; margin-top: 4px; }
.t-input { background: none; border: none; outline: none; color: #c9d1d9; font-family: 'Consolas', monospace; font-size: 0.82rem; flex: 1; caret-color: #3fb950; }
.cursor-block { display: inline-block; width: 9px; height: 15px; background: #3fb950; animation: cur 1s infinite; vertical-align: middle; margin-left: 1px; }
@keyframes cur { 0%,49%{opacity:1} 50%,100%{opacity:0} }

/* RDP Desktop */
.rdp-desktop { flex: 1; background: #1a2332; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.rdp-taskbar { background: #1e3a5f; border-top: 1px solid #2d5a8e; padding: 4px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; order: 2; }
.rdp-start { background: #0078d4; border: none; color: #fff; padding: 4px 14px; border-radius: 3px; font-size: 0.78rem; cursor: pointer; font-weight: 600; }
.rdp-clock { margin-left: auto; font-size: 0.72rem; color: #a0c4e8; font-family: 'Consolas', monospace; }
.rdp-tray  { display: flex; gap: 6px; align-items: center; margin-right: 8px; }
.rdp-tray-icon { width: 16px; height: 16px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; cursor: pointer; }
.rdp-area { flex: 1; order: 1; position: relative; overflow: hidden; display: flex; align-items: flex-start; padding: 16px; gap: 16px; flex-wrap: wrap; align-content: flex-start; }
.desktop-icon { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 8px 6px; border-radius: 4px; width: 72px; transition: background .12s; }
.desktop-icon:hover { background: #ffffff18; }
.desktop-icon.selected { background: #0078d430; outline: 1px solid #0078d4; }
.di-icon { font-size: 2rem; }
.di-label { font-size: 0.68rem; color: #c9d1d9; text-align: center; line-height: 1.2; text-shadow: 0 1px 3px #000; word-break: break-word; }

/* RDP Window */
.rdp-window { position: absolute; background: #fff; border-radius: 4px 4px 0 0; box-shadow: 0 8px 32px #00000080; overflow: hidden; min-width: 480px; }
.rdp-win-bar { background: #0078d4; padding: 6px 12px; display: flex; align-items: center; gap: 8px; cursor: move; }
.rdp-win-title { font-size: 0.78rem; color: #fff; font-weight: 600; flex: 1; }
.rdp-win-btns { display: flex; gap: 2px; }
.rdp-wb { width: 28px; height: 20px; border: none; cursor: pointer; font-size: 0.72rem; display: flex; align-items: center; justify-content: center; color: #fff; background: transparent; border-radius: 2px; }
.rdp-wb:hover { background: #ffffff30; }
.rdp-wb.close:hover { background: #c42b1c; }
.rdp-win-body { background: #f3f3f3; padding: 0; }
.rdp-toolbar { background: #e5e5e5; border-bottom: 1px solid #ccc; padding: 4px 8px; display: flex; gap: 4px; }
.rdp-tb-btn { background: #fff; border: 1px solid #ccc; padding: 2px 8px; font-size: 0.72rem; cursor: pointer; border-radius: 2px; color: #333; }
.rdp-tb-btn:hover { background: #e5f0ff; border-color: #0078d4; }
.rdp-content { padding: 8px; font-size: 0.78rem; color: #333; min-height: 200px; font-family: 'Consolas', monospace; overflow: auto; max-height: 260px; }
.rdp-row { padding: 3px 6px; border-radius: 2px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.rdp-row:hover { background: #e5f0ff; }
.rdp-row.selected { background: #cce4ff; }

/* WireGuard panel */
.wg-panel { flex: 1; background: #0d1117; padding: 20px; overflow-y: auto; }
.wg-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.wg-card-title { font-size: 0.8rem; font-weight: 700; color: #d2a8ff; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.wg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.wg-field { background: #0d1117; border-radius: 5px; padding: 10px 12px; }
.wg-field-label { font-size: 0.68rem; color: #8b949e; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 3px; }
.wg-field-val { font-family: 'Consolas', monospace; font-size: 0.78rem; color: #c9d1d9; word-break: break-all; }
.wg-field-val.green  { color: #3fb950; }
.wg-field-val.purple { color: #d2a8ff; }
.peer-list { display: flex; flex-direction: column; gap: 8px; }
.peer-item { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
.peer-left { display: flex; flex-direction: column; gap: 3px; }
.peer-name { font-size: 0.82rem; font-weight: 600; color: #c9d1d9; }
.peer-ip   { font-size: 0.75rem; color: #58a6ff; font-family: 'Consolas', monospace; }
.peer-key  { font-size: 0.68rem; color: #8b949e; font-family: 'Consolas', monospace; }
.peer-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.peer-status { font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 8px; }
.ps-active   { background: #3fb95020; color: #3fb950; border: 1px solid #3fb95040; }
.ps-inactive { background: #f8514920; color: #f85149; border: 1px solid #f8514940; }
.peer-latency { font-size: 0.7rem; color: #8b949e; font-family: 'Consolas', monospace; }
.wg-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 5px 12px; border-radius: 5px; font-size: 0.75rem; cursor: pointer; transition: all .12s; }
.wg-btn:hover { border-color: #d2a8ff; color: #d2a8ff; }
</style>
</head>
<body>

<div class="topbar">
  <div class="tab active" id="tab-ssh" onclick="switchTab('ssh')">
    <div class="dot dot-ssh"></div> SSH Terminal
  </div>
  <div class="tab" id="tab-rdp" onclick="switchTab('rdp')">
    <div class="dot dot-rdp"></div> RDP Desktop
  </div>
  <div class="tab" id="tab-wg" onclick="switchTab('wg')">
    <div class="dot dot-wg"></div> WireGuard Tunnel
  </div>
  <div class="spacer"></div>
  <div class="topbar-info">
    <div class="status-pill"><div class="blink"></div> Infrastructure Online</div>
    <span>WG: 10.100.0.1/24</span>
  </div>
</div>

<div class="workspace">
  <!-- Left panel -->
  <div class="left-panel">
    <div class="panel-title">Hosts</div>
    <div class="host-list" id="host-list"></div>
    <div class="divider"></div>
    <div class="panel-section">Session Info</div>
    <div class="info-block">
      <div class="info-row"><span class="info-label">Protocol</span><span class="info-val" id="si-proto">SSH</span></div>
      <div class="info-row"><span class="info-label">Host</span><span class="info-val" id="si-host">—</span></div>
      <div class="info-row"><span class="info-label">User</span><span class="info-val" id="si-user">—</span></div>
      <div class="info-row"><span class="info-label">Auth</span><span class="info-val green" id="si-auth">—</span></div>
      <div class="info-row"><span class="info-label">Tunnel</span><span class="info-val purple" id="si-tunnel">—</span></div>
    </div>
    <div class="panel-section" style="margin-top:4px;">Vault Token</div>
    <div class="info-block">
      <div class="info-row"><span class="info-label">TTL</span><span class="info-val blue" id="si-ttl">—</span></div>
      <div class="info-row"><span class="info-label">Policy</span><span class="info-val" id="si-policy">—</span></div>
      <div class="info-row"><span class="info-label">Renewable</span><span class="info-val green">yes</span></div>
    </div>
  </div>

  <!-- SSH pane -->
  <div class="main-pane" id="pane-ssh">
    <div class="session-bar">
      <div class="win-btn win-close"></div>
      <div class="win-btn win-min"></div>
      <div class="win-btn win-max"></div>
      <span class="session-title" id="ssh-title">No session</span>
      <div class="session-right">
        <button class="sess-btn" onclick="clearTerminal()">Clear</button>
        <button class="sess-btn" onclick="reconnect()">Reconnect</button>
      </div>
    </div>
    <div class="terminal" id="terminal" onclick="focusInput()">
      <div id="output"></div>
      <div class="input-row" id="input-row" style="display:none">
        <span class="t-prompt" id="prompt-label">$ </span>
        <input class="t-input" id="cmd-input" autocomplete="off" spellcheck="false" onkeydown="handleKey(event)" />
        <span class="cursor-block"></span>
      </div>
    </div>
  </div>

  <!-- RDP pane -->
  <div class="main-pane" id="pane-rdp" style="display:none">
    <div class="session-bar">
      <div class="win-btn win-close"></div>
      <div class="win-btn win-min"></div>
      <div class="win-btn win-max"></div>
      <span class="session-title" id="rdp-title">No session</span>
      <div class="session-right">
        <button class="sess-btn" onclick="rdpDisconnect()">Disconnect</button>
      </div>
    </div>
    <div class="rdp-desktop" id="rdp-desktop">
      <div class="rdp-area" id="rdp-area"></div>
      <div class="rdp-taskbar">
        <button class="rdp-start">⊞ Start</button>
        <div id="rdp-open-apps" style="display:flex;gap:6px;"></div>
        <div class="rdp-tray">
          <div class="rdp-tray-icon" title="WireGuard">🔒</div>
          <div class="rdp-tray-icon" title="Network">📶</div>
        </div>
        <div class="rdp-clock" id="rdp-clock"></div>
      </div>
    </div>
  </div>

  <!-- WireGuard pane -->
  <div class="main-pane" id="pane-wg" style="display:none">
    <div class="session-bar">
      <div class="win-btn win-close"></div>
      <div class="win-btn win-min"></div>
      <div class="win-btn win-max"></div>
      <span class="session-title">WireGuard Tunnel Status — wg0</span>
      <div class="session-right">
        <button class="sess-btn" onclick="refreshWg()">↻ Refresh</button>
      </div>
    </div>
    <div class="wg-panel" id="wg-panel"></div>
  </div>
</div>

<script>
// ── Host definitions ──────────────────────────────────────
var HOSTS = [

  });

  document.getElementById("si-user").textContent   = h.user;

}

function handleKey(e) {
  var inp = document.getElementById("cmd-input");
  if (e.key === "Enter") {
    var cmd = inp.value.trim();
    inp.value = "";
    if (!cmd) return;
    cmdHistory.unshift(cmd);
    histIdx = -1;
    // Echo command
    appendLine("t-line", document.getElementById("prompt-label").textContent + cmd);
    // Run
    var fn = SSH_CMDS[cmd];
    var result = fn ? fn() : unknownCmd(cmd);
    result.forEach(function(r) { appendLine(r[0], r[1]); });
    appendLine("t-line", "");
    var term = document.getElementById("terminal");
    term.scrollTop = term.scrollHeight;
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) {
      histIdx++;
      inp.value = cmdHistory[histIdx];
    }
  } else if (e.key === "ArrowDown") {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; inp.value = cmdHistory[histIdx]; }
    else { histIdx = -1; inp.value = ""; }
  } else if (e.key === "l" && e.ctrlKey) {
    e.preventDefault(); clearTerminal(true);
    showInputRow();
  }
}

// Drag windows
var _drag = null;
function dragWin(e, id) {
  var win = document.getElementById("rdp-win-" + id);
  _drag = { win: win, ox: e.clientX - win.offsetLeft, oy: e.clientY - win.offsetTop };
  document.onmousemove = function(ev) {
    if (!_drag) return;
    _drag.win.style.left = (ev.clientX - _drag.ox) + "px";
    _drag.win.style.top  = (ev.clientY - _drag.oy) + "px";
  };
  document.onmouseup = function() { _drag = null; document.onmousemove = null; document.onmouseup = null; };
}

        '<span class="peer-latency">RTT ' + p.latency + '</span>' +
      '</div>' +
    '</div>';
  }).join("");

  peers.innerHTML =
    '<div class="wg-card-title">👥 Peers (' + WG_PEERS.length + ')' +
      '<button class="wg-btn" style="margin-left:auto" onclick="refreshWg()">↻ Refresh</button>' +
    '</div>' +
    '<div class="peer-list">' + peerRows + '</div>';
  panel.appendChild(peers);

  // Traffic card
  var traffic = document.createElement("div");
  traffic.className = "wg-card";
  traffic.innerHTML =
    '<div class="wg-card-title">📊 Traffic Stats</div>' +
    '<div class="wg-grid">' +
      '<div class="wg-field"><div class="wg-field-label">Total Received</div><div class="wg-field-val green">12.4 MiB</div></div>' +
      '<div class="wg-field"><div class="wg-field-label">Total Sent</div><div class="wg-field-val green">4.1 MiB</div></div>' +
      '<div class="wg-field"><div class="wg-field-label">Active Peers</div><div class="wg-field-val blue">' + WG_PEERS.filter(function(p){return p.active;}).length + ' / ' + WG_PEERS.length + '</div></div>' +
      '<div class="wg-field"><div class="wg-field-label">Last Handshake</div><div class="wg-field-val">1m 3s ago</div></div>' +
      '<div class="wg-field"><div class="wg-field-label">Encryption</div><div class="wg-field-val purple">ChaCha20-Poly1305</div></div>' +
      '<div class="wg-field"><div class="wg-field-label">Key Exchange</div><div class="wg-field-val purple">Curve25519</div></div>' +
    '</div>';
  panel.appendChild(traffic);
}

function refreshWg() {
  WG_PEERS.forEach(function(p) {
    if (p.active) p.latency = (Math.floor(Math.random() * 6) + 1) + "ms";
  });
  renderWg();
}

// ── Init: select first host ───────────────────────────────
selectHost(HOSTS[0]);
</script>
</body>
</html>
